<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f4f2ec" />
  <title>Nathalia Cury — Art Director & Designer</title>
  <meta name="description" content="Nathalia Cury — Senior Art Director & Designer. Branding, editorial and AI-driven design. Based in Stuttgart." />
  <meta property="og:title" content="Nathalia Cury — Art Director & Designer" />
  <meta property="og:description" content="Branding, editorial and AI-driven design — from concept to launch." />
  <meta property="og:image" content="assets/work/yaga-1.jpg" />
  <meta property="og:type" content="website" />

  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Hanken+Grotesk:ital,wght@0,300..800;1,400..600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Page-load intro -->
  <div class="loader" id="loader" aria-hidden="true">
    <div class="loader__inner">
      <span class="loader__name">Nathalia Cury — Portfolio ’26</span>
      <span class="loader__count" id="loaderCount">0</span>
    </div>
  </div>

  <div class="cursor" id="cursor" aria-hidden="true"><span class="cursor__label"></span></div>
  <div class="progress" id="progress" aria-hidden="true"></div>

  <!-- Navigation -->
  <header class="nav" id="nav">
    <a href="#top" class="nav__brand" data-cursor="" aria-label="Home">Nathalia Cury</a>
    <div class="nav__right">
      <nav class="nav__links" aria-label="Primary">
        <a href="#work" data-link>Work</a>
        <a href="#about" data-link>About</a>
        <a href="#cv" data-link>CV</a>
        <a href="#contact" data-link>Contact</a>
      </nav>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle light / dark theme"></button>
      <button class="nav__menu" id="navMenu" aria-label="Menu" aria-expanded="false"><span></span><span></span></button>
    </div>
  </header>

  <!-- Mobile menu -->
  <div class="menu" id="menu" aria-hidden="true">
    <nav class="menu__links">
      <a href="#work" data-link>Work</a>
      <a href="#about" data-link>About</a>
      <a href="#cv" data-link>CV</a>
      <a href="#contact" data-link>Contact</a>
    </nav>
    <div class="menu__foot" id="menuFoot"></div>
  </div>

  <main id="top">
    <!-- ===================== LANDING ===================== -->
    <section class="hero" id="hero">
      <div class="hero__media" id="heroMedia" data-cursor="scroll"></div>
      <div class="hero__head">
        <span class="hero__eyebrow" id="heroEyebrow"></span>
        <span class="hero__loc" id="heroLoc"></span>
      </div>
      <h1 class="hero__statement" id="heroStatement"></h1>
      <div class="hero__bottom">
        <p class="hero__intro" id="heroIntro"></p>
        <a href="#work" class="hero__scroll" data-cursor=""><i></i><span>Selected work</span></a>
      </div>
    </section>

    <!-- Featured big tiles -->
    <section class="featured" id="featured" aria-label="Featured work"></section>

    <!-- Clients -->
    <section class="clients" aria-hidden="true"><div class="clients__track" id="clients"></div></section>

    <!-- ===================== WORK ===================== -->
    <section class="work" id="work">
      <div class="sec-head">
        <span class="sec-head__idx">①</span>
        <h2 class="sec-head__title" data-fx>Selected Work</h2>
        <div class="filters" id="filters" role="tablist" aria-label="Filter work"></div>
      </div>
      <div class="grid" id="grid"></div>
    </section>

    <!-- ===================== ABOUT ===================== -->
    <section class="about" id="about">
      <div class="sec-head">
        <span class="sec-head__idx">②</span>
        <h2 class="sec-head__title" data-fx>About</h2>
      </div>
      <div class="about__wrap">
        <p class="about__headline" id="aboutHeadline" data-fx></p>
        <div class="about__body" id="aboutBody"></div>
      </div>
      <div class="about__stats" id="aboutStats"></div>
      <div class="about__caps" id="aboutCaps"></div>
    </section>

    <!-- ===================== CV ===================== -->
    <section class="cv" id="cv">
      <div class="sec-head">
        <span class="sec-head__idx">③</span>
        <h2 class="sec-head__title" data-fx>Curriculum Vitae</h2>
        <button class="pill" id="btnPrint" data-cursor="">Download / Print ↓</button>
      </div>
      <div class="cv__grid" id="cvGrid"></div>
    </section>

    <!-- ===================== CONTACT ===================== -->
    <section class="contact" id="contact">
      <span class="contact__kicker" data-fx>Let’s make something</span>
      <a class="contact__mail" id="contactMail" data-cursor="email" href="#"></a>
      <div class="contact__row" id="contactRow"></div>
    </section>
  </main>

  <footer class="footer">
    <span id="footerName"></span>
    <span class="footer__credit">Built with care · <span id="year"></span></span>
    <button class="footer__edit" id="editToggle" title="Toggle edit mode">Edit</button>
  </footer>

  <!-- ===================== CASE STUDY OVERLAY ===================== -->
  <div class="case" id="case" aria-hidden="true" role="dialog" aria-modal="true">
    <button class="case__close" id="caseClose" aria-label="Close">Close ✕</button>
    <div class="case__scroll" id="caseScroll"></div>
  </div>

  <!-- Edit-mode toolbar -->
  <div class="editbar" id="editbar" aria-hidden="true">
    <span class="editbar__dot"></span>
    <span class="editbar__msg">Edit mode — click text to change it. Saves in this browser.</span>
    <button id="editExport">Export</button>
    <button id="editReset">Reset</button>
    <button id="editExit">Done</button>
  </div>

  <script src="js/content.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
